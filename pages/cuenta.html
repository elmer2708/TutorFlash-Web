<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi cuenta | TutorFlash</title>

    <link rel="stylesheet" href="../css/cuenta.css" />
  </head>

  <body>
    <header class="cuenta-header">
      <a href="../index.html" class="logo-link" aria-label="Ir al inicio">
        <img
          src="../assets/img/logo-tutorflash-transparente.png"
          alt="TutorFlash"
        />
      </a>

      <a href="../index.html" class="volver-inicio"> Volver al inicio </a>
    </header>

    <main class="cuenta-main">
      <section class="cuenta-layout">
        <section class="auth-panel">
          <div class="auth-card" id="authCard">
            <div class="auth-card-header">
              <p>Mi cuenta</p>
              <h2>Inicia sesión</h2>
              <span>Accede a tu cuenta de TutorFlash.</span>
            </div>

            <p class="auth-mensaje oculto" id="authMensaje"></p>

            <form id="loginForm" class="auth-form">
              <label for="loginCorreo">Correo electrónico</label>
              <input
                type="email"
                id="loginCorreo"
                placeholder="ejemplo@correo.com"
                autocomplete="email"
                required
              />

              <label for="loginPassword">Contraseña</label>
              <input
                type="password"
                id="loginPassword"
                placeholder="Ingresa tu contraseña"
                autocomplete="current-password"
                minlength="6"
                required
              />

              <button type="submit" id="btnLogin" class="btn-auth-principal">
                Iniciar sesión
              </button>

              <button type="button" id="btnRestablecerPassword" class="btn-auth-link">
                Olvidé mi contraseña
              </button>

              <p class="auth-cambio">
                ¿No tienes cuenta?
                <button type="button" id="mostrarRegistro">Crear cuenta</button>
              </p>
            </form>

            <form id="registroForm" class="auth-form oculto">
              <label for="registroNombre">Nombre completo</label>
              <input
                type="text"
                id="registroNombre"
                placeholder="Escribe tu nombre completo"
                autocomplete="name"
                minlength="2"
                maxlength="60"
                required
              />

              <label for="registroRol">Tipo de cuenta</label>
              <select id="registroRol">
                <option value="estudiante">Soy estudiante</option>
                <option value="tutor">Quiero postular como tutor</option>
              </select>

              <label for="registroCorreo">Correo electrónico</label>
              <input
                type="email"
                id="registroCorreo"
                placeholder="ejemplo@correo.com"
                autocomplete="email"
                required
              />

              <label for="registroPassword">Contraseña</label>
              <input
                type="password"
                id="registroPassword"
                placeholder="Mínimo 6 caracteres"
                autocomplete="new-password"
                minlength="6"
                required
              />

              <button type="submit" id="btnRegistro" class="btn-auth-principal">
                Crear cuenta
              </button>

              <p class="auth-cambio">
                ¿Ya tienes cuenta?
                <button type="button" id="mostrarLogin">Iniciar sesión</button>
              </p>
            </form>

            <div class="cuenta-activa oculto" id="cuentaActiva">
              <div class="cuenta-activa-icono">✓</div>

              <h2>Redirigiendo a tu panel...</h2>
              <p id="usuarioActualTexto">Validando tu rol en TutorFlash.</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="../js/cuenta.js"></script>
  </body>
</html>
