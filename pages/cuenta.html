<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi cuenta | TutorFlash</title>

    <link rel="stylesheet" href="../css/cuenta.css" />
  </head>
  <body>
    <header class="cuenta-header">
      <a href="../index.html" class="logo-link">
        <img
          src="../assets/img/logo-tutorflash-transparente.png"
          alt="TutorFlash"
        />
        <span>TutorFlash</span>
      </a>

      <nav>
        <a href="../index.html">Inicio</a>
        <a href="app.html#buscar">Buscar tutor</a>
        <a href="sesiones.html">Mis sesiones</a>
        <a href="cuenta.html">Mi cuenta</a>
      </nav>
    </header>

    <main class="cuenta-main">
      <section class="cuenta-hero">
        <h1>Mi cuenta</h1>
        <p>
          Regístrate o inicia sesión para guardar tus reservas y ver tus
          sesiones.
        </p>
      </section>

      <section class="auth-wrapper">
        <div class="auth-card" id="authCard">
          <form id="loginForm">
            <h2>Iniciar sesión</h2>

            <input
              type="email"
              id="loginCorreo"
              placeholder="Correo electrónico"
            />
            <input
              type="password"
              id="loginPassword"
              placeholder="Contraseña"
            />

            <button type="button" id="btnLogin">Iniciar sesión</button>

            <p class="auth-cambio">
              ¿No tienes cuenta?
              <button type="button" id="mostrarRegistro">Crear cuenta</button>
            </p>
          </form>

          <form id="registroForm" class="oculto">
            <h2>Crear cuenta</h2>

            <input
              type="text"
              id="registroNombre"
              placeholder="Nombre completo"
            />

            <select id="registroRol">
              <option value="estudiante">Soy estudiante</option>
              <option value="tutor">Soy tutor</option>
            </select>
            <input
              type="email"
              id="registroCorreo"
              placeholder="Correo electrónico"
            />
            <input
              type="password"
              id="registroPassword"
              placeholder="Contraseña mínima de 6 caracteres"
            />

            <button type="button" id="btnRegistro">Registrarme</button>

            <p class="auth-cambio">
              ¿Ya tienes cuenta?
              <button type="button" id="mostrarLogin">Iniciar sesión</button>
            </p>
          </form>

          <div class="cuenta-activa oculto" id="cuentaActiva">
            <h2>Sesión iniciada</h2>
            <p id="usuarioActualTexto"></p>
            <button type="button" id="btnCerrarSesion">Cerrar sesión</button>
          </div>
        </div>
      </section>

      <p class="auth-mensaje" id="authMensaje"></p>
    </main>

    <script type="module" src="../js/cuenta.js"></script>
  </body>
</html>
